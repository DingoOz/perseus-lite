# Force-load the Tegra display DRM + Nvidia DRM modules at boot.
#
# Without these, /dev/dri/card1 (the DP-1 display device) is not created
# under multi-user.target — Xorg/GDM would normally pull them in. The
# perseus-lite-screen kiosk fails with "Could not open DRM (NV) device"
# without them.
#
# Installed to /etc/modules-load.d/perseus-lite-display.conf by
# install-kiosk.sh. systemd-modules-load.service reads this at boot.
tegra-drm
nvidia-drm
