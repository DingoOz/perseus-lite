# Build the Sphinx documentation site (`nix build .#docs`) and deploy
# the rendered HTML to GitHub Pages. Reuses the same nix install action
# and Cachix substituters as the main `all.yaml` workflow so warm-cache
# builds are fast.
name: Deploy docs to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "software/**"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel an in-progress
# run — we want production deployments to finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            extra-trusted-substituters = https://roar-qutrc.cachix.org https://ros.cachix.org
            extra-trusted-public-keys = roar-qutrc.cachix.org-1:ZKgHZSSHH2hOAN7+83gv1gkraXze5LSEzdocPAEBNnA= ros.cachix.org-1:dSyZxI8geDCJrwgvCOHDoAfOm5sV1wCPjBkKL+38Rvo=
            extra-trusted-users = root
      - name: Build docs
        run: nix build --option sandbox relaxed -L .#docs
      - name: Stage rendered HTML
        # Dereference the result/ symlink into a regular dir so
        # upload-pages-artifact can package it cleanly.
        run: |
          mkdir -p _site
          cp -RL result/html/. _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    name: Deploy to Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
